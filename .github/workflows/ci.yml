name: CI

on:
  push:
  pull_request:

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m py_compile scripts/diagnosis_engine.py scripts/server.py scripts/evaluate.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Benchmark
        run: python scripts/evaluate.py
